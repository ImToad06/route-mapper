services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: route_mapper
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/route_mapper
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      - postgres

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      PUBLIC_API_URL: http://api:3000
      PORT: 3001
    ports:
      - '3001:3000'
    depends_on:
      - api

volumes:
  postgres_data:
